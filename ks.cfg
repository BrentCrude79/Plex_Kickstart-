# RHEL 10 Hardened Media Server Kickstart 
text
zerombr
authselect select minimal
keyboard --vconsole=us --xlayouts=us
lang en_US.UTF-8
eula --agreed
firstboot --disable
reboot
rootpw --lock

# ========================================================
# NETWORK & USER CONFIGURATION
# ========================================================
#Edit Line Below with your personal variables: 
network --bootproto=static --device=link --ip=192.168.x.x --netmask=255.255.255.0 --gateway=192.168.1.1 --nameserver=192.168.1.1,8.8.8.8 --hostname=SYSTEMNAME

#Edit Line Below with your personal variables: 
user --name=USER --groups=wheel --password=PASSWORD123 --plaintext
timezone America/Los_Angeles --utc

#Edit Line Below with your personal variables: 
rhsm --organization="GITHUBORG" --activation-key="YOURGITHUBPERSONALACTIVATIONKEY"

# ========================================================
# STORAGE CONFIGURATION
# ========================================================
#This will erase the first NVME drive in the system and install RedHat on it. IF you ignore this dont be mad that your drive was wiped. 
ignoredisk --only-use=nvme0n1
clearpart --all --initlabel --drives=nvme0n1
autopart --type=lvm

# ========================================================
# PACKAGES
# ========================================================
%packages
@minimal-environment
cockpit
cockpit-podman
podman
samba
samba-common-tools
tuned
hdparm
rsync
nano
net-tools
dnf-automatic
policycoreutils-python-utils
avahi
-insights-client
%end

# ========================================================
# POST-INSTALLATION ENGINE
# ========================================================
%post --log=/var/log/kickstart_post.log
#!/bin/bash
set -x


# --- 0. Mount External Storage (ext4) ---
# Detects drive > 1.5TB and adds to fstab
#requires that you have a 1.5TB or greater storage drive in addition to your NVMe boot drive; will not be harmed.

# --- 0. Mount & Install Dynamic Storage ---
# We scan for block devices > 1.5TB

for dev in $(lsblk -lno NAME,FSTYPE,SIZE -e 7,11 | awk '$3 ~ /[0-9]{4,}/ {print $1}'); do
    
    # 1. Skip if already in fstab
    if grep -q "/dev/$dev" /etc/fstab; then continue; fi
    
    # 2. Get details
    SIZE_BYTES=$(blockdev --getsize64 /dev/$dev)
    if [ "$SIZE_BYTES" -gt 1800000000000 ]; then
        FSTYPE=$(lsblk -no FSTYPE /dev/$dev)
        UUID=$(blkid -o value -s UUID /dev/$dev)
        
        # 3. Reactive Package Installation & Mount Options
        # Using "defaults,nofail,noatime,lazytime,commit=60" as the performance baseline
        case "$FSTYPE" in
            btrfs)
                if ! dnf list installed btrfs-progs >/dev/null 2>&1; then dnf install -y btrfs-progs; fi
                OPTIONS="defaults,nofail,noatime,lazytime,commit=60"
                ;;
            ext4|xfs)
                OPTIONS="defaults,nofail,noatime,lazytime,commit=60"
                ;;
            ntfs|ntfs3|exfat|vfat)
                # NTFS/FAT does not support noatime/lazytime/commit in the same way.
                # We use uid/gid to ensure Plex can read/write these drives.
                OPTIONS="defaults,nofail,uid=1000,gid=1000,umask=002"
                ;;
            *)
                OPTIONS="defaults,nofail"
                ;;
        esac

        # 4. Finalize Mount
        if [ -n "$UUID" ]; then
            echo "UUID=$UUID /Library $FSTYPE $OPTIONS 0 2" >> /etc/fstab
            mkdir -p /Library
            chown plex:plex /Library
            chmod 775 /Library
            break
        fi
    fi
done

# --- 1. Infrastructure Directories ---
mkdir -p /USB /Library /home/plex/.ssh /home/plex/.config/containers/systemd 
mkdir -p /home/plex/{sonarr,radarr,plex,sabnzbd,homeassistant,wud,guardtowarr}


# --- 2. Network Stability & Repositories ---
echo "nameserver 192.168.1.1" > /etc/resolv.conf
echo "nameserver 8.8.8.8" >> /etc/resolv.conf

systemctl enable systemd-resolved
cat << 'EOF' > /etc/systemd/resolved.conf
[Resolve]
DNS=192.168.1.1 8.8.8.8
DNSOverTLS=yes
DNSSEC=yes
EOF
ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf

nmcli connection modify enp3s0 ipv4.method manual ipv4.addresses 192.168.x.x/24 ipv4.gateway 192.168.1.1 ipv4.dns "192.168.1.1 8.8.8.8" connection.autoconnect yes
nmcli connection up enp3s0

dnf config-manager --add-repo https://pkgs.tailscale.com/stable/rhel/10/tailscale.repo
dnf install -y tailscale

# --- 2.5 & 3. Consolidated Kernel & Security Tuning ---
cat << 'EOF' > /etc/sysctl.d/99-steelybox.conf
# Security
kernel.randomize_va_space = 2
fs.suid_dumpable = 0
net.ipv4.ip_forward = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
kernel.unprivileged_bpf_disabled = 1
kernel.kptr_restrict = 1
kernel.sysrq = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# Performance
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_expire_centisecs = 6000
vm.dirty_writeback_centisecs = 6000
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10
EOF
sysctl -p /etc/sysctl.d/99-steelybox.conf

if [ -b /dev/nvme0n1 ]; then blockdev --setra 4096 /dev/nvme0n1; fi
cat << 'EOF' > /etc/udev/rules.d/69-hdparm.rules
ACTION=="add", SUBSYSTEM=="block", KERNEL=="sd[a-z]", ATTR{queue/rotational}=="1", RUN+="/usr/sbin/hdparm -B 127 -S 0 /dev/%k", RUN+="/usr/sbin/blockdev --setra 4096 /dev/%k"
EOF

# 2.7 ---- AUTOMATIC SAMBA CONFIGURATION ----
#delete this entire section if you dont want your media volume shared over SMB 
cat << 'EOF' >> /etc/samba/smb.conf
[Media]
    comment = Steelybox Media Volume
    path = /Library
    valid users = plex
    writable = yes
    browsable = yes
    guest ok = no
    printable = no
    create mask = 0664
    directory mask = 0775
EOF

restorecon -R /Library || true



# --- 3. Stability Hardening & Session Control ---
sed -i 's/GRUB_CMDLINE_LINUX="/GRUB_CMDLINE_LINUX="pci=nomsi pcie_aspm=off /' /etc/default/grub
grub2-mkconfig -o /boot/grub2/grub.cfg

echo "readonly TMOUT=900" >> /etc/profile.d/timeout.sh
echo "export TMOUT" >> /etc/profile.d/timeout.sh
chmod 644 /etc/profile.d/timeout.sh
sed -i 's/umask 022/umask 027/g' /etc/bashrc
sed -i 's/umask 022/umask 027/g' /etc/profile
update-crypto-policies --set FIPS

# --- Fix SELinux for Samba ---
# Allow Samba to access and share all exported directories
setsebool -P samba_export_all_rw 1


# --- Fix SELinux for Podman/Containers ---
# Allow containers to use the system-wide podman socket
# This prevents the AVC denials we saw with user_tmp_t
semanage fcontext -a -t container_file_t "/run/podman(/.*)?"
restorecon -Rv /run/podman

# --- Enable Global Podman Socket ---
# This ensures containers can communicate reliably without 
# session-based socket path issues
systemctl enable --now podman.socket

# 3.1 ---- AUTOMATED PACKAGE UPGRADES ----
cat << 'EOF' > /etc/dnf/automatic.conf
[commands]
upgrade_type = default
download_updates = yes
apply_updates = yes
random_sleep = 0
reboot = when-needed
reboot_command = "shutdown -r +5 'System rebooting for updates'"
[emitters]
emit_via = motd
[base]
debuglevel = 1
EOF
systemctl enable dnf-automatic-install.timer

# --- 4. SSH Hardening ---
cat << 'EOF' > /etc/ssh/sshd_config.d/01-hardening.conf
TrustedUserCAKeys /etc/ssh/trusted-user-ca-keys.pem
AllowTcpForwarding no
X11Forwarding no
AllowAgentForwarding no
MaxAuthTries 3
MaxSessions 2
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys
PasswordAuthentication yes
PermitRootLogin no
ClientAliveInterval 300
ClientAliveCountMax 0
PermitEmptyPasswords no
IgnoreRhosts yes
EOF
chmod 600 /etc/ssh/sshd_config.d/01-hardening.conf

# --- 5. Media Syncing ---
#this section assumes you have an external USB drive that you've added to /etc/fstab as noauto, meaning the mount daemon knows how to sudo mount /USB, but it doesnt automout at boot. This will do a bidirectional sync so the USB drive mirrors your plex storage volumes every morning. Its important to comment out the line mentioned below for the cron job if you dont have this, or it will fill your /USB with a copy of all your data. 

usermod -aG video,render plex
echo "plex ALL=(ALL) NOPASSWD: /usr/bin/mount /USB, /usr/bin/umount /USB, /usr/bin/rsync" > /etc/sudoers.d/plex-media-sync
chmod 0440 /etc/sudoers.d/plex-media-sync

cat << 'EOF' > /home/plex/media_sync.sh
#!/bin/bash
MOUNT_POINT="/USB"
LOG_FILE="/var/log/media_sync.log"
sudo mount "$MOUNT_POINT" >> "$LOG_FILE" 2>&1
if mountpoint -q "$MOUNT_POINT"; then
    sudo rsync -rtv --delete /Library/TV/ "$MOUNT_POINT/TV/" >> "$LOG_FILE" 2>&1
    sudo rsync -rtv --delete /Library/Movies/ "$MOUNT_POINT/Movies/" >> "$LOG_FILE" 2>&1
    sync
    sudo umount "$MOUNT_POINT" >> "$LOG_FILE" 2>&1
fi
EOF
chmod +x /home/plex/media_sync.sh
chown plex:plex /home/plex/media_sync.sh
# --- COMMENT OUT BELOW IF YOU DONT HAVE A USB BACKUP DRIVE 
echo "0 5 * * * plex /home/plex/media_sync.sh >> /var/log/media_sync.log 2>&1" > /etc/cron.d/media_sync


# Podman Contiainer volume backup
# Prepare the log file
touch /var/log/containerbackup.log
chown plex:plex /var/log/containerbackup.log

# Create the backup script
cat << 'EOF' > /home/plex/container_backup.sh
#!/bin/bash
LOG_FILE="/var/log/containerbackup.log"
exec >> "$LOG_FILE" 2>&1

SOURCE_BASE="/home/plex/"
BACKUP_BASE="/Library/Backup/ContainerData"
DATE=$(date +%Y-%m-%d_%H-%M)
CONTAINERS=("plex" "sonarr" "radarr" "sabnzbd" "homeassistant" "wud" "guardtowarr")

for container in "${CONTAINERS[@]}"; do
    SRC="$SOURCE_BASE/$container"
    DEST="$BACKUP_BASE/$DATE/$container"
    if [ ! -d "$SRC" ]; then continue; fi
    mkdir -p "$DEST"
    
    EXCLUDES=("--exclude=Cache/" "--exclude=logs/" "--exclude=Logs/" "--exclude=Backups/" "--exclude=UpdateLogs/" "--exclude=tmp/")
    if [ "$container" == "plex" ]; then
        EXCLUDES+=( "--exclude=Library/Application Support/Plex Media Server/Cache/" "--exclude=Library/Application Support/Plex Media Server/Media/" "--exclude=Library/Application Support/Plex Media Server/Crash Reports/" "--exclude=Library/Application Support/Plex Media Server/Updates/" )
    fi
    rsync -av "${EXCLUDES[@]}" "$SRC/" "$DEST/"
done

# Cleanup
ls -dt "$BACKUP_BASE"/*/ 2>/dev/null | tail -n +6 | xargs rm -rf
EOF

chmod +x /home/plex/container_backup.sh
chown plex:plex /home/plex/container_backup.sh

# Schedule: Everyday at 5am
echo "0 5 * * * plex /home/plex/container_backup.sh" > /etc/cron.d/container_backup

# --- 6. Firewall ---
firewall-offline-cmd --permanent --add-port=32400/tcp
firewall-offline-cmd --permanent --add-port=8989/tcp
firewall-offline-cmd --permanent --add-port=7878/tcp
firewall-offline-cmd --permanent --add-port=8080/tcp
firewall-offline-cmd --permanent --add-port=8123/tcp
firewall-offline-cmd --permanent --add-port=3000/tcp
firewall-offline-cmd --permanent --add-service=samba
firewall-offline-cmd --permanent --add-service=cockpit
firewall-offline-cmd --permanent --add-service=mdns
firewall-offline-cmd --permanent --zone=trusted --add-interface=tailscale0

# --- 7. Podman Quadlets ---
cat << EOF > /home/$VAR_USER/.config/containers/systemd/media_net.network
[Network]
NetworkName=media_net
EOF

cat << EOF > /home/$VAR_USER/.config/containers/systemd/plex.container
[Container]
ContainerName=plex
Image=docker.io/plexinc/pms-docker:plexpass
#Edit Line Below with your personal variable: 
HostName=SYSTEMNAME
#Edit Line Below with your personal variable: 
#may need changes if you dont have AMD GPU on the LIBVADriver
Environment=TZ=America/Los_Angeles PLEX_CLAIM=YOUR PLEX CLAIM TOKEN ADVERTISE_IP=http://192.168.x.x:32400/ LIBVA_DRIVER_NAME=radeonsi PLEX_UID=0 PLEX_GID=0
Volume=/home/$VAR_USER/plex:/config:Z
Volume=/Library/TV:/TV:z
Volume=/Library/Movies:/Movies:z
Tmpfs=/transcode:rw,size=4294967296
PublishPort=32400:32400/tcp
PublishPort=8324:8324/tcp
PublishPort=32469:32469/tcp
PublishPort=1900:1900/udp
PublishPort=32410:32410/udp
PublishPort=32412:32412/udp
PublishPort=32413:32413/udp
PublishPort=32414:32414/udp
AddDevice=/dev/dri:/dev/dri
Label=wud.watch.digest=true
[Install]
WantedBy=default.target
EOF

cat << EOF > /home/$VAR_USER/.config/containers/systemd/sonarr.container
[Container]
ContainerName=sonarr
Image=ghcr.io/linuxserver/sonarr:latest
Environment=PUID=0 PGID=0 TZ=America/Los_Angeles
Volume=/home/$VAR_USER/sonarr:/config:Z
Volume=/Library/TV:/TV:z
Volume=/Library/Downloads:/downloads:z
PublishPort=8989:8989
Network=media_net.network
Label=wud.watch.digest=true
[Install]
WantedBy=default.target
EOF

cat << EOF > /home/$VAR_USER/.config/containers/systemd/radarr.container
[Container]
ContainerName=radarr
Image=ghcr.io/linuxserver/radarr:latest
Environment=PUID=0 PGID=0 TZ=America/Los_Angeles
Volume=/home/$VAR_USER/radarr:/config:Z
Volume=/Library/Movies:/Movies:z
Volume=/Library/Downloads:/downloads:z
PublishPort=7878:7878
Network=media_net.network
Label=wud.watch.digest=true
[Install]
WantedBy=default.target
EOF

cat << EOF > /home/$VAR_USER/.config/containers/systemd/sabnzbd.container
[Container]
ContainerName=sabnzbd
Image=ghcr.io/linuxserver/sabnzbd:latest
Environment=PUID=0 PGID=0 TZ=America/Los_Angeles
Volume=/home/$VAR_USER/sabnzbd:/config:Z
Volume=/Library/Downloads:/downloads:z
Volume=/Library/Downloads/incomplete:/incomplete:z
PublishPort=8080:8080
Network=media_net.network
Label=wud.watch.digest=true
[Install]
WantedBy=default.target
EOF

cat << EOF > /home/$VAR_USER/.config/containers/systemd/homeassistant.container
[Container]
ContainerName=home-assistant
Image=ghcr.io/home-assistant/home-assistant:stable
Environment=TZ=America/Los_Angeles
Volume=/home/$VAR_USER/homeassistant:/config
PublishPort=8123:8123
PodmanArgs=--privileged
Label=wud.watch.digest=true
[Install]
WantedBy=default.target
EOF

cat << EOF > /home/$VAR_USER/.config/containers/systemd/wud.container
[Unit]
Description=What's Up Docker Container
Requires=podman.socket
After=podman.socket
[Container]
ContainerName=wud
Image=docker.io/getwud/wud:latest
Environment=WUD_TRIGGER_DOCKER_LOCAL_MODE=simple
Volume=%t/podman/podman.sock:/var/run/docker.sock
Volume=/home/$VAR_USER/wud:/store:Z
Network=host
[Install]
WantedBy=default.target
EOF

[Unit]
Description=GuardTowarr Container
Requires=podman.socket
After=podman.socket

cat << EOF > /home/$VAR_USER/.config/containers/systemd/guardtowarr.container
[Container]
ContainerName=guardtowarr
Image=tonytrawl/guardtowarr:latest
Environment=TZ=America/Los_Angeles
Environment=SONARR_URL=http://localhost:8989
#Edit Line Below with your personal variable: 
Environment=SONARR_API_KEY=APIKEY
Environment=RADARR_URL=http://localhost:7878
#Edit Line Below with your personal variable: 
Environment=RADARR_API_KEY=APIKEY
# Persistent storage for GuardTowarr
Volume=/home/plex/guardtowarr:/config:Z
Network=media_net.network
# Add label for WUD to watch for updates
Label=wud.watch.digest=true
PublishPort=9595:9595
[Install]
WantedBy=default.target
EOF 

# --- 8. Final Services ---
chown -R plex:plex /home/plex
mkdir -p /var/lib/systemd/linger
touch /var/lib/systemd/linger/plex
systemctl enable sshd tuned cockpit.socket tailscaled dnf-automatic-install.timer smb nmb avahi-daemon
dnf clean all
%end